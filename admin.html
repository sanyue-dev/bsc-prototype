<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>蓝鲨充电 · 运营管理平台</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<!-- Ant Design v5 -->
<link rel="stylesheet" href="https://unpkg.com/antd@5.21.0/dist/reset.css"/>
<script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
<script src="https://unpkg.com/@ant-design/icons@5.5.1/dist/index.umd.js"></script>
<script src="https://unpkg.com/antd@5.21.0/dist/antd.min.js"></script>
<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif; }
  #root { height: 100%; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c8cdd6; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a8b0bc; }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="admin/components.jsx"></script>
<script type="text/babel" src="admin/login.jsx"></script>
<script type="text/babel" src="admin/screens-1.jsx"></script>
<script type="text/babel" src="admin/screens-2.jsx"></script>
<script type="text/babel" src="admin/screens-3.jsx"></script>
<script type="text/babel" src="admin/screens-4.jsx"></script>
<script type="text/babel" src="admin/screens-5.jsx"></script>

<!-- ── Root App ───────────────────────────────────────────────── -->
<script type="text/babel">
function AdminApp() {
  const [screen, setScreen] = React.useState(
    () => localStorage.getItem('admin_screen') || 'dashboard'
  )
  const nav = id => {
    setScreen(id)
    localStorage.setItem('admin_screen', id)
  }
  const TITLES = {
    dashboard: '运营看板',
    reports:   '报表中心',
    orders:    '充电订单',
    sessions:  '充电会话',
    stations:  '站点管理',
    devices:   '设备管理',
    tickets:   '故障工单',
    pricing:   '计费配置',
    users:     '用户管理',
    coupons:   '优惠券管理',
    roles:     '角色管理',
    perms:     '权限管理',
  }
  const SCREENS = {
    dashboard: <DashboardScreen nav={nav}/>,
    reports:   <ReportsScreen nav={nav}/>,
    orders:    <OrdersScreen nav={nav}/>,
    sessions:  <SessionsScreen nav={nav}/>,
    stations:  <StationsScreen nav={nav}/>,
    devices:   <DevicesScreen nav={nav}/>,
    tickets:   <TicketsScreen nav={nav}/>,
    pricing:   <PricingScreen nav={nav}/>,
    users:     <UsersScreen nav={nav}/>,
    coupons:   <CouponsScreen nav={nav}/>,
    roles:     <RolesScreen nav={nav}/>,
    perms:     <PermissionsScreen nav={nav}/>,
  }
  return (
    <AdminLayout active={screen} onNav={nav} title={TITLES[screen] || '看板'}>
      {SCREENS[screen] || SCREENS.dashboard}
    </AdminLayout>
  )
}

function App() {
  const [loggedIn, setLoggedIn] = React.useState(
    () => !!localStorage.getItem('admin_logged_in')
  )

  React.useEffect(() => {
    window.__onAdminLogout = () => setLoggedIn(false)
    return () => { window.__onAdminLogout = null }
  }, [])

  const content = loggedIn
    ? <AdminApp/>
    : <LoginPage onLogin={() => setLoggedIn(true)}/>

  return (
    <antd.ConfigProvider>
      <antd.App>
        {content}
      </antd.App>
    </antd.ConfigProvider>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
